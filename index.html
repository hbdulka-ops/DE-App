<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Briefvorlage</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600&family=Source+Sans+3:wght@400;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #d6d2c9;
    font-family: 'Source Serif 4', Georgia, serif;
    display: flex; flex-direction: column; align-items: center;
    padding: 1.5rem 1rem;
  }

  .toolbar {
    width: 210mm; max-width: 100%;
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 0.6rem;
    font-family: 'Source Sans 3', sans-serif;
  }
  .toolbar-hint { font-size: 0.73rem; color: #7a7060; }
  .btn-print {
    background: #2c3e50; color: #fff; border: none;
    padding: 0.4rem 1.1rem;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.75rem; letter-spacing: 0.07em;
    text-transform: uppercase; cursor: pointer;
  }
  .btn-print:hover { background: #1a2a38; }

  /* ── A4 — min-height so it grows with content ── */
  .page {
    width: 210mm;
    min-height: 297mm;
    max-width: 100%;
    background: #faf9f7;
    padding: 12mm 20mm 14mm 25mm;
    position: relative;
    box-shadow: 0 4px 28px rgba(0,0,0,0.18);
  }

  /* ── EDITABLE ── */
  [contenteditable] {
    outline: none; border-radius: 2px;
    transition: background 0.12s;
    min-width: 10px; display: inline-block;
  }
  [contenteditable]:hover { background: #eef4fb; }
  [contenteditable]:focus { background: #ddeeff; box-shadow: 0 0 0 1.5px #5b9bd5; }
  [contenteditable].block { display: block; width: 100%; white-space: pre-wrap; word-break: break-word; }
  [contenteditable][data-ph]:empty::before {
    content: attr(data-ph); color: #c0b8b0; font-style: italic; pointer-events: none;
  }

  /* ── ABSENDER ── */
  .absender {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 7.5pt; color: #555; line-height: 1.5;
    margin-bottom: 3mm;
  }
  .absender-row { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
  .sep { color: #ccc; }

  /* ── EMPFÄNGER + DATUM nebeneinander ── */
  .header-row {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 4mm;
  }
  .empfaenger { font-size: 9.5pt; line-height: 1.6; }
  .empfaenger .org { font-weight: 600; }
  .datum-block {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 8pt; color: #1a1a1a;
    text-align: right; white-space: nowrap;
    padding-top: 1mm;
  }

  /* ── BETREFF ── */
  .betreff {
    padding-left: 3.5mm;
    border-left: 2.5px solid #2c3e50;
    font-size: 10.5pt; font-weight: 600; color: #2c3e50; line-height: 1.3;
    margin-bottom: 3.5mm;
  }

  /* ── BODY ── */
  .brief-body { font-size: 9.5pt; line-height: 1.55; color: #1a1a1a; }
  .anrede  { margin-bottom: 2mm; }
  .p       { margin-bottom: 2mm; }
  .gruss   { margin-top: 3mm; margin-bottom: 5mm; }

  .sig-name { font-size: 9.5pt; font-weight: 600; }

  /* ── PRINT ── */
  @media print {
    @page { size: A4; margin: 0; }
    body { background: #fff; padding: 0; }
    .toolbar { display: none; }
    .page { box-shadow: none; min-height: 297mm; }
    [contenteditable]:hover,
    [contenteditable]:focus { background: none !important; box-shadow: none !important; }
    [contenteditable][data-ph]:empty::before { color: #ddd; font-style: normal; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <span class="toolbar-hint">✎ Felder anklicken → Text eingeben → Drucken</span>
  <button class="btn-print" onclick="window.print()">⎙ Drucken / Als PDF</button>
</div>

<div class="page">

  <!-- ABSENDER -->
  <div class="absender">
    <div class="absender-row">
      <span contenteditable data-ph="Ihr Name"></span>
      <span class="sep">·</span>
      <span contenteditable data-ph="Straße Nr."></span>
      <span class="sep">·</span>
      <span contenteditable data-ph="PLZ"></span>
      <span contenteditable data-ph="Stadt"></span>
    </div>
  </div>

  <!-- EMPFÄNGER + DATUM -->
  <div class="header-row">
    <div class="empfaenger">
      <div class="org"><span contenteditable data-ph="Name / Firma"></span></div>
      <div><span contenteditable data-ph="Straße und Hausnummer"></span></div>
      <div><span contenteditable data-ph="PLZ"></span>&nbsp;<span contenteditable data-ph="Stadt"></span></div>
    </div>
    <div class="datum-block">
      <span contenteditable data-ph="Stadt"></span>, den <span contenteditable data-ph="TT. Monat JJJJ"></span>
    </div>
  </div>

  <!-- BETREFF -->
  <div class="betreff">
    <span contenteditable class="block" data-ph="Betreff …"></span>
  </div>

  <!-- BODY -->
  <div class="brief-body">

    <div class="anrede">
      <span contenteditable class="block" data-ph="Sehr geehrte Damen und Herren,"></span>
    </div>

    <div class="p">
      <span contenteditable class="block" data-ph="Einleitung …"></span>
    </div>

    <div class="p">
      <span contenteditable class="block" data-ph="Hauptteil …"></span>
    </div>

    <div class="p">
      <span contenteditable class="block" data-ph="Weiteres … (oder leer lassen)"></span>
    </div>

    <div class="p">
      <span contenteditable class="block" data-ph="Abschluss …"></span>
    </div>

    <div class="gruss">
      <span contenteditable class="block" data-ph="Mit freundlichen Grüßen"></span>
    </div>

    <div class="sig-name">
      <span contenteditable data-ph="Vor- und Nachname"></span>
    </div>

  </div>

</div>

</body>
</html>
