<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Briefvorlage – Editierbar</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600&family=Source+Sans+3:wght@400;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #d6d2c9;
    font-family: 'Source Serif 4', Georgia, serif;
    display: flex; flex-direction: column; align-items: center;
    padding: 1.5rem 1rem;
  }

  /* ── TOOLBAR ── */
  .toolbar {
    width: 210mm; max-width: 100%;
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 0.8rem;
    font-family: 'Source Sans 3', sans-serif;
  }
  .toolbar-title {
    font-size: 0.78rem; letter-spacing: 0.08em;
    text-transform: uppercase; color: #6b6056;
  }
  .btn-print {
    background: #2c3e50; color: #fff; border: none;
    padding: 0.45rem 1.2rem;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.78rem; letter-spacing: 0.07em;
    text-transform: uppercase; cursor: pointer;
  }
  .btn-print:hover { background: #1a2a38; }

  /* ── A4 PAGE ── */
  .page {
    width: 210mm; height: 297mm; max-width: 100%;
    background: #faf9f7;
    padding: 17mm 22mm 14mm 28mm;
    position: relative;
    box-shadow: 0 4px 28px rgba(0,0,0,0.18);
    overflow: hidden;
  }

  /* ── EDITABLE FIELD ── */
  [contenteditable] {
    outline: none;
    border-radius: 2px;
    transition: background 0.15s;
    min-width: 20px;
    display: inline-block;
  }
  [contenteditable]:hover { background: #eef4fb; }
  [contenteditable]:focus {
    background: #ddeeff;
    box-shadow: 0 0 0 1.5px #5b9bd5;
  }
  [contenteditable].block {
    display: block;
    width: 100%;
    white-space: pre-wrap;
  }
  /* placeholder text */
  [contenteditable][data-ph]:empty::before {
    content: attr(data-ph);
    color: #b0a898;
    font-style: italic;
    pointer-events: none;
  }

  /* ── ABSENDER ── */
  .absender {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 8pt; color: #444; line-height: 1.65;
  }
  .absender .name {
    font-family: 'Source Serif 4', serif;
    font-size: 11pt; font-weight: 600; color: #1a1a1a;
    margin-bottom: 1mm;
  }
  .absender-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .sep { color: #b0a898; }
  .absender-rule { height: 0.5px; background: #b5ada0; margin: 3mm 0; }

  /* ── INFOBLOCK ── */
  .infoblock {
    position: absolute; right: 22mm; top: 17mm;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 8pt; color: #555; text-align: right; line-height: 1.9;
  }
  .infoblock .lbl {
    font-size: 6.5pt; text-transform: uppercase;
    letter-spacing: 0.07em; color: #aaa;
  }
  .infoblock .datum-line { font-size: 9pt; color: #1a1a1a; margin-top: 2mm; }

  /* ── EMPFÄNGER ── */
  .rueck {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 6.5pt; color: #999;
    border-bottom: 0.5px solid #c5bdb4;
    padding-bottom: 1.5mm; margin-bottom: 2.5mm;
  }
  .empfaenger { font-size: 10pt; line-height: 1.7; }
  .empfaenger .org { font-weight: 600; }

  .gap { height: 8mm; }

  /* ── BETREFF ── */
  .betreff {
    margin: 4mm 0;
    padding-left: 4mm;
    border-left: 2.5px solid #2c3e50;
    font-size: 11pt; font-weight: 600; color: #2c3e50;
    line-height: 1.35;
  }

  /* ── BODY ── */
  .brief-body { font-size: 9.5pt; line-height: 1.72; color: #1a1a1a; }
  .anrede { margin-bottom: 4mm; }
  .p { margin-bottom: 3.5mm; }
  .schluss { margin: 5mm 0 4mm; }
  .gruss { margin-bottom: 11mm; }

  .sig-line {
    border-top: 0.5px solid #b5ada0;
    padding-top: 2mm; display: inline-block; min-width: 55mm;
  }
  .sig-name { font-size: 9.5pt; font-weight: 600; }
  .sig-titel { font-family: 'Source Sans 3', sans-serif; font-size: 7.5pt; color: #666; }

  /* ── ANLAGEN ── */
  .anlagen {
    margin-top: 6mm; border-top: 0.5px solid #b5ada0; padding-top: 3mm;
    font-family: 'Source Sans 3', sans-serif; font-size: 8pt; color: #666;
  }
  .anlagen b {
    font-size: 7pt; text-transform: uppercase; letter-spacing: 0.06em;
    color: #aaa; display: block; margin-bottom: 1.5mm;
  }

  /* ── PRINT ── */
  @media print {
    @page { size: A4; margin: 0; }
    body { background: #fff; padding: 0; }
    .toolbar { display: none; }
    .page { box-shadow: none; }
    [contenteditable]:hover,
    [contenteditable]:focus { background: none !important; box-shadow: none !important; }
    [contenteditable][data-ph]:empty::before { color: #ccc; font-style: normal; }
  }
</style>
</head>
<body>

<!-- TOOLBAR -->
<div class="toolbar">
  <span class="toolbar-title">✎ Felder anklicken und ausfüllen</span>
  <button class="btn-print" onclick="window.print()">⎙ Drucken / Als PDF</button>
</div>

<!-- PAGE -->
<div class="page">

  <!-- ABSENDER -->
  <div class="absender">
    <div class="name">
      <span contenteditable data-ph="Vor- und Nachname"></span>
    </div>
    <div class="absender-row">
      <span contenteditable data-ph="Straße Nr."></span>
      <span class="sep">·</span>
      <span contenteditable data-ph="PLZ"></span>
      <span contenteditable data-ph="Stadt"></span>
      <span class="sep">·</span>
      <span contenteditable data-ph="Telefon"></span>
      <span class="sep">·</span>
      <span contenteditable data-ph="E-Mail"></span>
    </div>
  </div>
  <div class="absender-rule"></div>

  <!-- INFOBLOCK -->
  <div class="infoblock">
    <div class="lbl">Aktenzeichen</div>
    <span contenteditable data-ph="—"></span>
    <div class="datum-line">
      <span contenteditable data-ph="Stadt"></span>, den
      <span contenteditable data-ph="TT. Monat JJJJ"></span>
    </div>
  </div>

  <!-- EMPFÄNGER -->
  <div class="rueck">
    <span contenteditable data-ph="Ihr Name"></span> ·
    <span contenteditable data-ph="Straße Nr."></span> ·
    <span contenteditable data-ph="PLZ Stadt"></span>
  </div>
  <div class="empfaenger">
    <div class="org"><span contenteditable data-ph="Behörde / Unternehmen"></span></div>
    <div><span contenteditable data-ph="z. Hd. Frau / Herrn ..."></span></div>
    <div><span contenteditable data-ph="Straße und Hausnummer"></span></div>
    <div>
      <span contenteditable data-ph="PLZ"></span>&nbsp;
      <span contenteditable data-ph="Stadt"></span>
    </div>
  </div>

  <div class="gap"></div>

  <!-- BETREFF -->
  <div class="betreff">
    <span contenteditable class="block" data-ph="Betreff: Kurze Beschreibung des Anliegens"></span>
  </div>

  <!-- BRIEF BODY -->
  <div class="brief-body">

    <div class="anrede">
      Sehr geehrte
      <span contenteditable data-ph="Damen und Herren,"></span>
    </div>

    <div class="p">
      <span contenteditable class="block" data-ph="Einleitung: Kurze Nennung des Anliegens ..."></span>
    </div>

    <div class="p">
      <span contenteditable class="block" data-ph="Hauptteil: Sachverhalt, Fakten und Hintergründe vollständig darlegen ..."></span>
    </div>

    <div class="p">
      <span contenteditable class="block" data-ph="Ergänzende Informationen oder Verweis auf beigefügte Unterlagen ..."></span>
    </div>

    <div class="p schluss">
      Für Rückfragen stehe ich Ihnen jederzeit gerne zur Verfügung.
      Für Ihre Bemühungen danke ich Ihnen im Voraus.
    </div>

    <div class="gruss">Mit freundlichen Grüßen</div>

    <div class="sig-line">
      <div class="sig-name">
        <span contenteditable data-ph="Vor- und Nachname"></span>
      </div>
      <div class="sig-titel">
        <span contenteditable data-ph="Funktion / Titel (optional)"></span>
      </div>
    </div>

  </div>

  <!-- ANLAGEN -->
  <div class="anlagen">
    <b>Anlagen</b>
    <span contenteditable class="block" data-ph="z. B. Kopie Personalausweis · Nachweis · Formular XY  (leer lassen falls keine Anlagen)"></span>
  </div>

</div><!-- /page -->

</body>
</html>
